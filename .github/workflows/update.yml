name: 🌾 Ulavarnanban — Live Price Update

on:
  schedule:
    - cron: "0 */1 * * *"      # every hour on the hour
  workflow_dispatch:            # manual trigger button

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: ⬇️  Checkout repo
        uses: actions/checkout@v4

      - name: 🐍  Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦  Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌾  Run price fetcher
        run: python script.py

      - name: 💾  Commit & push updated prices.json
        run: |
          git config --global user.name  "ulavarnanban-bot"
          git config --global user.email "bot@ulavarnanban.agri"
          git add prices.json
          git diff --cached --quiet && echo "No changes — skipping commit" || \
            git commit -m "🌾 Auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')" && git push
